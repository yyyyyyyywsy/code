name: AI News Daily Report

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout ai_news repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: yyyyyyyywsy/ai_news
          path: ai_news

      - name: Update index.html with new date
        run: |
          cd ai_news
          DATE=$(date +"%Y年%-m月%-d日")
          sed -i "s/2026年.*月.*日/$DATE/g" index.html
          echo "Updated date to $DATE"

      - name: Commit and push changes
        run: |
          cd ai_news
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: AI热点日报 - $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

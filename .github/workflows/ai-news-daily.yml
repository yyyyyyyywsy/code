name: AI News Daily Report

on:
  schedule:
    # 每天北京时间 00:00 (UTC 16:00前一天)
    - cron: '0 16 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: yyyyyyyywsy/ai_news
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate daily AI news report
        run: |
          echo "Generating AI news report for $(date +%Y-%m-%d)"
          mkdir -p daily

      - name: Update index.html with new date
        run: |
          DATE=$(date +%Y年%-m月%-d日)
          sed -i "s/2026年.*月.*日/$DATE/g" index.html
          echo "Updated date to $DATE"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: AI热点日报 - $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

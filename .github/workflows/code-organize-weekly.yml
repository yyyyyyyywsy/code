name: Code Organization Weekly

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  organize-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate weekly report
        run: |
          python scripts/generate_weekly_report.py

      - name: Commit and push
        run: |
          git config user.name "Code Org Bot"
          git config user.email "code-org-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore: 代码整理周报 - $(date +%Y-%m-%d)" --allow-empty || echo "No changes"
          git push
